spring.application.name=encoding-service

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=encoding-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.value-serializer=org.apache.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.netflix.encodingservice.event.VideoUploadedEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.support.serializer.JsonSerializer

spring.server.port=8082

aws.access-key=${AWS_ACCESS_KEY:your-access-key}
aws.secret-key=${AWS_SECRET_KEY:your-secret-key}
aws.region=${AWS_REGION:ap-south-1}
aws.s3.bucket-name=${AWS_BUCKET_NAME:your-bucket-name}

ffmpeg.path=${FFMPEG_PATH:ffmpeg}

encoding.base-path=${TEMP_DIR:/tmp/encoding}

management.endpoints.web.exposure.include=health,info